services:
  # Redis for Celery broker, result backend, and caching
  redis:
    image: redis:7-alpine
    container_name: matcha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  matcha-backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-backend:latest
    container_name: matcha-backend
    ports:
      - "127.0.0.1:8002:8002"
    env_file:
      - .env.backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - uploads:/app/uploads
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker for background tasks
  # Start with: docker-compose --profile worker up -d
  # Or set COMPOSE_PROFILES=worker in .env
  matcha-worker:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-backend:latest
    container_name: matcha-worker
    profiles:
      - worker
    env_file:
      - .env.backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - uploads:/app/uploads
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    # Low memory mode: 1 concurrent task, restart after each to free memory
    command: python -m celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --max-tasks-per-child=5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      disable: true

  # llama.cpp server for local LLM inference (Qwen 0.8B)
  # Model file must exist on host at ./models/Qwen3.5-0.8B-Q4_K_M.gguf
  # Upload with: scp -i roonMT-arm.pem server/agent/models/Qwen3.5-0.8B-Q4_K_M.gguf ec2-user@<host>:~/matcha-recruit/models/
  llama:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-llama:latest
    container_name: matcha-llama
    profiles:
      - agent
    volumes:
      - ./models:/models:ro
    command: >
      --model /models/Qwen3.5-0.8B-Q4_K_M.gguf
      --port 8999
      --host 0.0.0.0
      --ctx-size 4096
      --log-disable
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8999/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Autonomous agent — uses local Qwen model via llama container
  matcha-agent:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-agent:latest
    container_name: matcha-agent
    profiles:
      - agent
    environment:
      - AGENT_WORKSPACE_ROOT=/workspace
      - AGENT_LOCAL_MODEL_URL=http://llama:8999
      - AGENT_GMAIL_ENABLED=${AGENT_GMAIL_ENABLED:-false}
    volumes:
      - agent_workspace:/workspace
    depends_on:
      llama:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - matcha-network
    entrypoint: ["python", "-m", "agent.agent"]
    command: ["--once"]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  matcha-frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-frontend:latest
    container_name: matcha-frontend
    ports:
      - "127.0.0.1:8082:80"
    environment:
      - API_URL=${API_URL:-http://localhost:8002}
      - WS_URL=${WS_URL:-ws://localhost:8002}
    depends_on:
      matcha-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Gummfit Agency Backend
  gummfit-backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/gummfit-backend:latest
    container_name: gummfit-backend
    ports:
      - "8003:8003"
    env_file:
      - .env.backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GUMMFIT_PORT=8003
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Gummfit Agency Frontend
  gummfit-frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/gummfit-frontend:latest
    container_name: gummfit-frontend
    ports:
      - "8083:80"
    environment:
      - API_URL=${GUMMFIT_API_URL:-http://localhost:8003}
      - WS_URL=${GUMMFIT_WS_URL:-ws://localhost:8003}
    depends_on:
      gummfit-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # gumm-local Backend
  gumm-local-backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/gumm-local-backend:latest
    container_name: gumm-local-backend
    ports:
      - "8004:8004"
    env_file:
      - .env.backend
    environment:
      - GUMM_LOCAL_PORT=8004
    volumes:
      - gumm_local_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # gumm-local Frontend
  gumm-local-frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/gumm-local-frontend:latest
    container_name: gumm-local-frontend
    ports:
      - "8084:80"
    environment:
      - API_URL=${GUMM_LOCAL_API_URL:-http://localhost:8004}
      - WS_URL=${GUMM_LOCAL_WS_URL:-ws://localhost:8004}
    depends_on:
      gumm-local-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  matcha-network:
    driver: bridge

volumes:
  uploads:
    driver: local
  redis_data:
    driver: local
  matcha_postgres_data:
    external: true
  gumm_local_uploads:
    driver: local
  agent_workspace:
    driver: local
