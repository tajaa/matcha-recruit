services:
  # Redis for Celery broker, result backend, and caching
  # Requires REDIS_PASSWORD to be set in .env (docker-compose reads it automatically)
  redis:
    image: redis:7-alpine
    container_name: matcha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  matcha-backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-backend:latest
    container_name: matcha-backend
    ports:
      - "127.0.0.1:8002:8002"
    env_file:
      - .env.backend
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
    volumes:
      - uploads:/app/uploads
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker for background tasks
  # Start with: docker-compose --profile worker up -d
  # Or set COMPOSE_PROFILES=worker in .env
  matcha-worker:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-backend:latest
    container_name: matcha-worker
    profiles:
      - worker
    env_file:
      - .env.backend
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
    volumes:
      - uploads:/app/uploads
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    # Low memory mode: 1 concurrent task, restart after each to free memory
    command: python -m celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --max-tasks-per-child=5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      disable: true

  # Autonomous agent — Gemini API + standalone UI on port 9100
  matcha-agent:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-agent:latest
    container_name: matcha-agent
    profiles:
      - agent
    ports:
      - "127.0.0.1:9100:9100"
    environment:
      - AGENT_WORKSPACE_ROOT=/workspace
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AGENT_API_SECRET=${AGENT_API_SECRET:-}
      - AGENT_GMAIL_ENABLED=${AGENT_GMAIL_ENABLED:-false}
    volumes:
      - agent_workspace:/workspace
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - matcha-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  matcha-frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-frontend:latest
    container_name: matcha-frontend
    ports:
      - "127.0.0.1:8082:80"
    environment:
      - API_URL=${API_URL:-http://localhost:8002}
      - WS_URL=${WS_URL:-ws://localhost:8002}
    depends_on:
      matcha-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  matcha-network:
    driver: bridge

volumes:
  uploads:
    driver: local
  redis_data:
    driver: local
  agent_workspace:
    driver: local
