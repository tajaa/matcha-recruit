services:
  # Redis for Celery broker, result backend, and caching
  # REDIS_PASSWORD is read from .env.backend (shared with all services)
  redis:
    image: redis:7-alpine
    container_name: matcha-redis
    env_file:
      - .env.backend
    ports:
      # localhost-only: containers reach redis via the compose network; the
      # host publish exists only for on-box debugging. Never expose 0.0.0.0.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    # maxmemory + volatile-lru: render-cache keys (TTL'd) evict under pressure,
    # celery broker keys (no TTL) never do. Without this the container cap
    # OOM-kills redis instead of evicting cache.
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD" --maxmemory 96mb --maxmemory-policy volatile-lru'
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: routine backend deploys go through scripts/deploy-backend-bluegreen.sh
  # (zero-downtime swap on 8002/8003), NOT `docker-compose up matcha-backend`.
  # This service definition is the disaster-recovery fallback for a from-scratch
  # `docker-compose up -d` on a fresh host — see matcha-frontend's note above,
  # same caveat applies (don't run it against a live host mid-blue/green-deploy).
  matcha-backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-backend:latest
    container_name: matcha-backend
    ports:
      - "127.0.0.1:8002:8002"
    env_file:
      - .env.backend
    volumes:
      - uploads:/app/uploads
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker for background tasks
  # Start with: docker-compose --profile worker up -d
  # Or set COMPOSE_PROFILES=worker in .env
  matcha-worker:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-backend:latest
    container_name: matcha-worker
    profiles:
      - worker
    env_file:
      - .env.backend
    volumes:
      - uploads:/app/uploads
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    # Low memory mode: 1 concurrent task, restart after each to free memory.
    # 128M covered the periodic scheduled tasks (compliance checks, reminders,
    # deadline escalation) but not er_document_processing, which parses an
    # upload of up to MAX_UPLOAD_SIZE (50MB) — the worker idles near 60M, so a
    # real document reliably breached the cgroup and got SIGKILLed at ~140M.
    #
    # An OOM is NOT retried, contrary to what this comment used to claim:
    # task_acks_late only redelivers when task_reject_on_worker_lost is set,
    # and max_retries applies to in-Python self.retry(). A SIGKILLed task is
    # marked FAILURE and dropped. reset_stale_er_documents (dispatched on
    # worker startup) is what releases any row an OOM stranded in 'processing'.
    command: python -m celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --max-tasks-per-child=5
    deploy:
      resources:
        limits:
          memory: 320M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      disable: true

  # Autonomous agent — Gemini API + standalone UI on port 9100
  matcha-agent:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-agent:latest
    container_name: matcha-agent
    profiles:
      - agent
    ports:
      - "127.0.0.1:9100:9100"
    environment:
      - AGENT_WORKSPACE_ROOT=/workspace
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AGENT_API_SECRET=${AGENT_API_SECRET:-}
      - AGENT_GMAIL_ENABLED=${AGENT_GMAIL_ENABLED:-false}
    volumes:
      - agent_workspace:/workspace
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - matcha-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: routine frontend deploys go through scripts/deploy-frontend-bluegreen.sh
  # (zero-downtime swap on 8082/8083), NOT `docker-compose up matcha-frontend`.
  # This service definition is the disaster-recovery fallback for a from-scratch
  # `docker-compose up -d` on a fresh host. Don't run that bare command against
  # a live host with an active blue/green deploy already running — it'll try to
  # recreate "matcha-frontend" on :8082, which may collide with whichever color
  # is currently active.
  matcha-frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-west-1}.amazonaws.com/matcha-frontend:latest
    container_name: matcha-frontend
    ports:
      - "127.0.0.1:8082:80"
    environment:
      - API_URL=${API_URL:-http://localhost:8002}
      - WS_URL=${WS_URL:-ws://localhost:8002}
    depends_on:
      matcha-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matcha-network
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  matcha-network:
    driver: bridge

volumes:
  uploads:
    driver: local
  redis_data:
    driver: local
  agent_workspace:
    driver: local
