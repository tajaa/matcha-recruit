user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # Timeouts to prevent hanging connections
    # NOTE: upload locations override client_max_body_size and client_body_timeout
    client_max_body_size 20m;
    client_body_timeout 30s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Request and connection limiting to reduce abuse/spam
    limit_req_zone $binary_remote_addr zone=matcha_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=matcha_auth:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=matcha_ws:10m rate=8r/m;
    limit_conn_zone $binary_remote_addr zone=matcha_conn:10m;
    limit_req_status 429;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream for backend API
    upstream matcha-backend {
        server matcha-backend:8002;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        limit_conn matcha_conn 30;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.cloudfront.net; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for index.html (for env injection)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }

        # WebSocket support for real-time interviews
        location /api/ws/ {
            limit_req zone=matcha_ws burst=10 nodelay;
            limit_conn matcha_conn 8;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 1200s;
            proxy_send_timeout 1200s;
        }

        # Login/auth paths get stricter rate limiting
        location /api/auth/ {
            limit_req zone=matcha_auth burst=20 nodelay;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
        }

        # File upload endpoints — larger body limits and longer timeouts
        location ~ ^/api/(matcha-work/(threads|projects)/[^/]+/(resume|handbook|file)/upload|er/cases/[^/]+/documents|ir/incidents/[^/]+/documents|matcha-work/projects/[^/]+/files)$ {
            limit_req zone=matcha_api burst=20 nodelay;
            client_max_body_size 100m;
            client_body_timeout 120s;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # API proxy (optional - use if frontend proxies to backend)
        location /api/ {
            limit_req zone=matcha_api burst=40 nodelay;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
        }

        # SPA fallback - redirect all to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ─── HTTPS server (uncomment when SSL certificates are provisioned) ───
    # server {
    #     listen 443 ssl http2;
    #     server_name hey-matcha.com www.hey-matcha.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # Copy all location blocks from port-80 server above
    # }
}
