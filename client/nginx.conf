user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # Timeouts to prevent hanging connections
    # NOTE: upload locations override client_max_body_size and client_body_timeout
    client_max_body_size 20m;
    client_body_timeout 30s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Request and connection limiting to reduce abuse/spam
    limit_req_zone $binary_remote_addr zone=matcha_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=matcha_auth:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=matcha_ws:10m rate=8r/m;
    limit_conn_zone $binary_remote_addr zone=matcha_conn:10m;
    limit_req_status 429;

    # Trust the host EC2 Nginx and Docker bridge gateway; replace $remote_addr
    # with the real client IP so limit_conn/limit_req zone keys are per-client,
    # not per-proxy (which would make them global across all users).
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;
    real_ip_recursive on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream for backend API
    upstream matcha-backend {
        server matcha-backend:8002;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        limit_conn matcha_conn 30;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.cloudfront.net; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

        # Hashed, content-addressed bundles (Vite emits everything hashed under
        # /assets/) — safe to cache forever. Scoped to /assets/ by PREFIX, not by
        # file extension, so unhashed root files (logo.svg, favicon, manifest) do
        # NOT inherit immutable and can update on deploy (see `location /` below).
        location ^~ /assets/ {
            # Static hashed bundles: a single SPA first-paint legitimately opens
            # 30-128 concurrent HTTP/2 streams for code-split chunks. nginx counts
            # each stream against limit_conn, so the inherited per-IP cap (30) would
            # reject the burst → 503 → maintenance.html (text/html) served for .js →
            # module MIME error → SPA crash. Opt assets out (no `limit_conn off` in
            # nginx; a high limit overrides the inherited one).
            limit_conn matcha_conn 1000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # The SPA shell must NEVER be cached, or a new build isn't picked up
        # until a hard refresh. ONE clean Cache-Control, and NO `expires` (which
        # would emit a conflicting max-age + future Expires). The SPA fallback
        # (`location /` → try_files → /index.html) internal-redirects here, so
        # navigations get this header too. Re-declare the security headers: an
        # add_header in a location suppresses the server-level ones.
        location = /index.html {
            add_header Cache-Control "no-store" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.cloudfront.net; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'" always;
            add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
        }

        # WebSocket support for real-time interviews
        location /api/ws/ {
            limit_req zone=matcha_ws burst=10 nodelay;
            limit_conn matcha_conn 8;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 1200s;
            proxy_send_timeout 1200s;
        }

        # Login/auth paths get stricter rate limiting
        location /api/auth/ {
            limit_req zone=matcha_auth burst=20 nodelay;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
        }

        # File upload endpoints — larger body limits and longer timeouts
        location ~ ^/api/(matcha-work/(threads|projects)/[^/]+/(resume|handbook|file)/upload|er/cases/[^/]+/documents|ir/incidents/[^/]+/documents|matcha-work/projects/[^/]+/files)$ {
            limit_req zone=matcha_api burst=20 nodelay;
            client_max_body_size 100m;
            client_body_timeout 120s;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Copilot SSE streams — disable buffering, longer timeout for Gemini calls.
        location ~ ^/api/ir/incidents/[^/]+/copilot/(stream|accept) {
            limit_req zone=matcha_api burst=40 nodelay;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        # API proxy (optional - use if frontend proxies to backend)
        location /api/ {
            limit_req zone=matcha_api burst=40 nodelay;
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
        }

        # SEO endpoints — proxy to backend (root path, no /api prefix).
        # Crawlers expect /sitemap.xml and /robots.txt at the canonical domain root.
        location = /sitemap.xml {
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location = /robots.txt {
            proxy_pass http://matcha-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ── Tell-Us — a SEPARATE Vite SPA built into this same container and
        # served at /tellus/. Its assets emit under /tellus/assets/ (base in its
        # vite.config), so they never collide with the main app's /assets/.
        # Hashed, content-addressed bundles — cache forever; same limit_conn
        # burst exemption as the main /assets/ (a first-paint opens many HTTP/2
        # streams; the inherited per-IP cap would 503 them → module MIME error).
        location ^~ /tellus/assets/ {
            limit_conn matcha_conn 1000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Tell-Us SPA shell — like the main `= /index.html`, the shell must be
        # no-store or a new build isn't picked up until a hard refresh. The
        # try_files fallback below internal-redirects here. Re-declare all
        # headers (add_header in a location suppresses server-level ones).
        location = /tellus/index.html {
            add_header Cache-Control "no-store" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.cloudfront.net https://*.amazonaws.com; media-src 'self' blob: https://*.cloudfront.net https://*.amazonaws.com; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'" always;
            add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
        }

        # Tell-Us SPA deep-link fallback (its OWN index so the main app's
        # /index.html doesn't capture /tellus/* routes). Tailored CSP: Tell-Us
        # renders user-submitted photos/video from PRIVATE-bucket S3 presigned
        # URLs (*.amazonaws.com) and PUTs uploads straight to S3, so img-src +
        # media-src must allow amazonaws.com (the main app's cloudfront-only CSP
        # would block them). connect-src keeps https: for the direct-to-S3 PUT.
        location /tellus/ {
            try_files $uri $uri/ /tellus/index.html;
            add_header Cache-Control "no-cache" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.cloudfront.net https://*.amazonaws.com; media-src 'self' blob: https://*.cloudfront.net https://*.amazonaws.com; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'" always;
            add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
        }

        # Root static (logo.svg, favicon, manifest, etc.) + SPA fallback.
        # no-cache = store but ALWAYS revalidate; ETag/Last-Modified make it a
        # cheap 304, so a brand-asset swap shows immediately on the next load
        # instead of being stuck behind a 1y immutable cache. Re-declare the
        # security headers: an add_header in a location suppresses the
        # server-level ones. Unknown routes try_files → /index.html, whose
        # `= /index.html` block keeps its own no-store + headers.
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.cloudfront.net; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'" always;
            add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # TLS terminates at the host Nginx (managed by Certbot on the EC2 box),
    # which proxies 443 → this container's :80 over the loopback. Do NOT add
    # an HTTPS block here — it would need separate cert plumbing inside the
    # container and break the Certbot auto-renew flow on the host.
    #
    # If you ever need in-container TLS (e.g. running outside the EC2 host),
    # mount certs at /etc/nginx/ssl/ and add a `listen 443 ssl http2;` server
    # block. See https://nginx.org/en/docs/http/configuring_https_servers.html
}
