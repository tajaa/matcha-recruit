    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fraunces carries the ital axis: the landing's display italics ("risk",
         "people", "human") are true italics, not synthesized obliques.
         Orbitron was dropped 2026-07 — its only consumer (TimelineConstructor)
         is no longer mounted anywhere. -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter:wght@300;400;500;600;700&family=Roboto+Flex:opsz,wght@8..144,100..1000&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <!-- Static SEO/unfurl tags for crawlers that don't execute JS (Slack,
         iMessage, WhatsApp…). useSEO() finds-and-updates these same elements
         at runtime, so they never duplicate. -->
    <meta name="description" content="Full-service HR for modern companies — an agentic risk & compliance platform, Matcha Lite for small teams, multi-state compliance tracking, and senior advisory." />
    <meta name="theme-color" content="#0E0E0C" />
