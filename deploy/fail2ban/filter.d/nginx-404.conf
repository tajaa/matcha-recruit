# Ban IPs that rack up 404s — scanners walking /wp-admin, /.env, /phpmyadmin.
#
# EXCEPT under /assets/. Those are Vite content-hashed chunks
# (/assets/PtoAccrual-C3wEVKM4.js). A blue-green deploy retires the old hashes,
# so every browser tab open across the swap 404s its way through the old chunk
# names. That is a stale client, not an attacker — the hashes are unguessable, so
# there is nothing there to probe for. It banned the owner out of his own site on
# 2026-07-14 (81 failures in 2 minutes) and looked exactly like an outage.
#
# Everything else still counts.
[Definition]
failregex = ^<HOST> -.*" (404|444) .*$
ignoreregex = ^<HOST> -.*"(GET|HEAD) /assets/[^"]*" 404 .*$
