# Cappe — website builder on dedicated domain gummfit.com.
# Apex/www → frontend SPA (Gummfit landing + builder; SPA mounts the
# Cappe tree at root on this host) with /api proxied to the backend.
# *.gummfit.com → backend renderer (routes on Host header).
# Upstreams are the blue/green `matcha_frontend` / `matcha_backend` groups
# defined in matcha.conf (active port lives in /etc/nginx/upstream/*.conf,
# rewritten by the deploy scripts) — NEVER hardcode 8082/8083/8002/8003 here,
# or gummfit.com 502s after the next blue/green swap kills the old container.
# Cert: lego DNS-01 via Hostinger API → /etc/lego/certificates, renewed by
# /etc/cron.d/lego-gummfit (deploy-hook reloads nginx).

# Apex + www — Gummfit marketing/builder
server {
    listen 443 ssl;
    http2 on;
    server_name gummfit.com www.gummfit.com;

    ssl_certificate     /etc/lego/certificates/gummfit.com.crt;
    ssl_certificate_key /etc/lego/certificates/gummfit.com.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # canonicalize www → apex
    if ($host = www.gummfit.com) {
        return 301 https://gummfit.com$request_uri;
    }

    # Maintenance parity with the main app
    error_page 502 503 504 = @maintenance;
    location @maintenance {
        if ($request_uri ~ ^/api/) {
            add_header Content-Type "application/json" always;
            return 503 '{"detail":"Server is updating. Try again in 30 seconds."}';
        }
        # Never hand an HTML body to a JS/CSS module loader during a deploy or
        # restart — text/html for /assets/*.js triggers a MIME error that crashes
        # the SPA. Bare 503 → the loader gets a clean failure (stale-chunk retry).
        if ($request_uri ~ ^/assets/) {
            return 503;
        }
        rewrite ^ /maintenance.html last;
    }
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    limit_conn matcha_conn 30;
    proxy_connect_timeout 5s;

    # Static hashed bundles — EXEMPT from limit_conn. A single SPA first-paint
    # opens 30-128 concurrent HTTP/2 streams for code-split chunks; nginx counts
    # each stream against limit_conn, so the inherited per-IP cap (30) rejected
    # the burst → 503 → maintenance.html (text/html) for .js → module MIME error
    # → SPA crash. High limit overrides the inherited 30 (no `limit_conn off`).
    location ^~ /assets/ {
        limit_conn matcha_conn 1000;
        proxy_pass http://matcha_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA (Gummfit landing + builder)
    location / {
        proxy_pass http://matcha_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Cappe auth — stricter rate limit
    location ^~ /api/cappe/auth/ {
        limit_req zone=matcha_auth burst=20 nodelay;
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Backend API
    location /api/ {
        limit_req zone=matcha_api burst=40 nodelay;
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

# Tenant Cappe sites — wildcard. Exact-match apex/www block above wins first,
# so only real subdomains land here. Renderer 404s unknown/reserved labels.
server {
    listen 443 ssl;
    http2 on;
    server_name *.gummfit.com;

    ssl_certificate     /etc/lego/certificates/gummfit.com.crt;
    ssl_certificate_key /etc/lego/certificates/gummfit.com.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    limit_conn matcha_conn 30;
    proxy_connect_timeout 5s;

    # Renderer pages + same-origin widget API both live on the backend.
    location / {
        limit_req zone=matcha_api burst=40 nodelay;
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;          # CRITICAL — renderer routes on Host
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# HTTP → HTTPS
server {
    listen 80;
    server_name gummfit.com www.gummfit.com *.gummfit.com;
    return 301 https://$host$request_uri;
}
