# Blue/green frontend target. The active port lives in
# matcha-frontend-active.conf, a host-only file (not in this repo, like
# maintenance.html) regenerated by scripts/deploy-frontend-bluegreen.sh on
# every frontend deploy and reloaded via `nginx -s reload` — graceful reload
# drains in-flight requests against the old upstream, so there's no gap where
# nginx has nothing to proxy to. Default content if the file doesn't exist
# yet: `server 127.0.0.1:8082;`
upstream matcha_frontend {
    include /etc/nginx/conf.d/matcha-frontend-active.conf;
}

# Same blue/green mechanism as matcha_frontend, for the backend (deploy via
# scripts/deploy-backend-bluegreen.sh). Note: established WebSocket / SSE
# connections to the OLD container are NOT migrated when it's removed — they
# drop and the client reconnects (channelSocket.ts etc. already do this with
# backoff). This only eliminates the gap for NEW requests during a deploy.
upstream matcha_backend {
    include /etc/nginx/conf.d/matcha-backend-active.conf;
}

server {
    server_name hey-matcha.com www.hey-matcha.com;

    # Maintenance page during deploys.
    # /api/* requests get a JSON body so the desktop client / SPA can show
    # a friendly retry message instead of dumping raw HTML into an alert.
    # Browser navigations still get the HTML maintenance page.
    error_page 502 503 504 = @maintenance;
    location @maintenance {
        if ($request_uri ~ ^/api/) {
            add_header Content-Type "application/json" always;
            return 503 '{"detail":"Server is updating. Try again in 30 seconds."}';
        }
        # Never hand an HTML body to a JS/CSS module loader during a deploy or
        # restart — text/html for /assets/*.js triggers a MIME error that crashes
        # the SPA. Bare 503 → the loader gets a clean failure (stale-chunk retry).
        if ($request_uri ~ ^/assets/) {
            return 503;
        }
        rewrite ^ /maintenance.html last;
    }
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.cloudfront.net; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://*.cloudfront.net blob:; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    limit_conn matcha_conn 30;
    proxy_connect_timeout 5s;

    # Static hashed bundles — EXEMPT from limit_conn. A single SPA first-paint
    # opens 30-128 concurrent HTTP/2 streams for code-split chunks; nginx counts
    # each stream against limit_conn, so the inherited per-IP cap (30) would
    # reject the burst → 503 → maintenance.html (text/html) for .js → module MIME
    # error → SPA crash. High limit overrides the inherited 30 (no `limit_conn off`).
    location ^~ /assets/ {
        limit_conn matcha_conn 1000;
        proxy_pass http://matcha_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Frontend
    location / {
        proxy_pass http://matcha_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SSE streaming endpoints (compliance checks, jurisdiction research)
    location ~ ^/api/(compliance/locations/.*/check|admin/jurisdictions/.*/check|matcha-work/threads/.*/messages/stream|matcha-work/threads/.*/handbook-upload)$ {
        limit_req zone=matcha_api burst=20 nodelay;

        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE requires no buffering and longer timeouts
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        chunked_transfer_encoding on;
    }

    # Uploaded files (resumes, logos, etc)
    location /uploads/ {
        limit_req zone=matcha_api burst=20 nodelay;

        proxy_pass http://matcha_backend/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Public form endpoints — tight per-IP rate limit to block spam
    location = /api/contact {
        limit_req zone=matcha_public_form burst=5 nodelay;
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /api/resources/waitlist/lite {
        limit_req zone=matcha_public_form burst=5 nodelay;
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location ~ ^/api/auth/(register/(business|candidate|individual|client|employee|beta)|forgot-password|reset-password|verify-email|google|broker-client-invite/[^/]+/accept)$ {
        limit_req zone=matcha_public_form burst=5 nodelay;
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Auth endpoints get stricter rate limits
    location ^~ /api/auth/ {
        limit_req zone=matcha_auth burst=20 nodelay;

        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Backend API
    # PDF export — needs longer timeout for WeasyPrint + S3 fetches
    location ~ ^/api/(er/cases/[^/]+/export|matcha-work/projects/[^/]+/export/(pdf|docx))$ {
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }


    # File upload endpoints — larger body limits and longer timeouts
    location ~ ^/api/(matcha-work/(threads|projects)/[^/]+/(resume|handbook|file)/upload|er/cases/[^/]+/documents|ir/incidents/[^/]+/documents|matcha-work/projects/[^/]+/files)$ {
        limit_req zone=matcha_api burst=20 nodelay;
        client_max_body_size 100m;
        client_body_timeout 120s;
        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }


    # Copilot SSE streams — disable buffering, longer timeout for Gemini AI calls.
    location ~ ^/api/ir/incidents/[^/]+/copilot/(stream|accept) {
        limit_req zone=matcha_api burst=40 nodelay;

        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        limit_req zone=matcha_api burst=40 nodelay;

        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # WebSocket for interviews (Gemini live sessions)
    location /api/ws/ {
        limit_req zone=matcha_ws burst=10 nodelay;
        limit_conn matcha_conn 8;

        proxy_pass http://matcha_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Avoid stale sockets if upstream sessions fail to close cleanly
        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;
    }

    # WebSocket for chat
    location /ws/ {
        limit_req zone=matcha_ws burst=15 nodelay;
        limit_conn matcha_conn 10;

        proxy_pass http://matcha_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # LiveKit signaling (WebSocket) — strips /livekit prefix and proxies to :7880
    location /livekit/ {
        proxy_pass http://127.0.0.1:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hey-matcha.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hey-matcha.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.hey-matcha.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = hey-matcha.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name hey-matcha.com www.hey-matcha.com;

    # Maintenance page during deploys.
    # /api/* requests get a JSON body so the desktop client / SPA can show
    # a friendly retry message instead of dumping raw HTML into an alert.
    # Browser navigations still get the HTML maintenance page.
    error_page 502 503 504 = @maintenance;
    location @maintenance {
        if ($request_uri ~ ^/api/) {
            add_header Content-Type "application/json" always;
            return 503 '{"detail":"Server is updating. Try again in 30 seconds."}';
        }
        # Never hand an HTML body to a JS/CSS module loader during a deploy or
        # restart — text/html for /assets/*.js triggers a MIME error that crashes
        # the SPA. Bare 503 → the loader gets a clean failure (stale-chunk retry).
        if ($request_uri ~ ^/assets/) {
            return 503;
        }
        rewrite ^ /maintenance.html last;
    }
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.cloudfront.net; connect-src 'self' wss: https:; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://*.cloudfront.net blob:; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
    return 404; # managed by Certbot
}
