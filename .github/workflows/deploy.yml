name: Build and Deploy

# Manual only. No pull_request trigger (dropped deliberately — PR builds burned
# runner time and this workflow's deploy leg must never be reachable from a PR).
# Trigger: Actions tab / GitHub mobile app / `gh workflow run deploy.yml -f target=matcha`
on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        type: choice
        default: matcha
        options:
          - matcha      # backend + worker + frontend
          - backend     # backend + worker only
          - frontend    # frontend only (no backup, no worker stop)
      hotfix:
        description: "Hotfix mode — pull + swap only (skip nginx sync, backup, pruning; 5s worker stop)"
        type: boolean
        default: false

# Never two deploys at once; a second dispatch queues instead of racing the swap.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-west-1
  AWS_ACCOUNT_ID: "010438494410"

jobs:
  build:
    name: Build and Push Images
    # Public repo => arm64-native runner is free. No QEMU: images are linux/arm64
    # and so is this machine.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      id-token: write   # OIDC -> AWS_ROLE_ARN (ECR push only)
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push
        run: |
          chmod +x ./scripts/build-and-push.sh
          # REGISTRY_CACHE auto-enables under $CI (build-and-push.sh line 41),
          # pushing :buildcache tags to the same ECR repos the role can write.
          case "${{ inputs.target }}" in
            backend)  ./scripts/build-and-push.sh --backend-only ;;
            frontend) ./scripts/build-and-push.sh --frontend-only ;;
            *)        ./scripts/build-and-push.sh ;;
          esac

  deploy:
    name: Blue-green deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    # A foreground ssh deploy that gets SIGHUP'd mid-swap can leave prod with
    # no worker container. Generous cap: the concurrency group above already
    # prevents a second deploy from racing, so a slow run just costs runner
    # minutes, not correctness.
    timeout-minutes: 45
    # No AWS permissions on purpose: ECR login for the pull happens ON the host
    # via the host's own credentials (update-ec2.sh ecr_login). This job only
    # needs SSH.
    permissions:
      contents: read
    steps:
      # persist-credentials: false — steps in a job share a filesystem, and
      # this job also writes the prod EC2 private key to $RUNNER_TEMP; no
      # reason for a stray .git/config token to sit next to it.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false

      - name: Write SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/ec2.pem"
          printf '%s\n' "$EC2_SSH_KEY" > "$RUNNER_TEMP/ec2.pem"

      - name: Deploy (update-ec2.sh, verbatim laptop path)
        env:
          SSH_KEY: ${{ runner.temp }}/ec2.pem
        run: |
          chmod +x ./scripts/update-ec2.sh
          FLAGS="--${{ inputs.target }}"
          if [ "${{ inputs.hotfix }}" = "true" ]; then
            FLAGS="$FLAGS --hotfix"
          fi
          ./scripts/update-ec2.sh $FLAGS
