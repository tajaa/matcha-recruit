name: PR checks

# deploy.yml deliberately has no pull_request trigger (that workflow's deploy
# leg must never be reachable from a PR), which left zero checks running on
# PRs. Cheap and separate on purpose: no Docker, no vite build — just enough
# to catch a broken import/syntax error before it merges green and is only
# discovered at deploy time.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Backend/scripts syntax check
        run: python -m compileall -q server/app server/alembic scripts

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: client

      - name: Frontend typecheck
        # NOT `npx tsc --noEmit` — the root tsconfig is files:[] + project
        # references, so the bare form checks nothing and always exits 0.
        run: npx tsc -p tsconfig.app.json --noEmit
        working-directory: client
