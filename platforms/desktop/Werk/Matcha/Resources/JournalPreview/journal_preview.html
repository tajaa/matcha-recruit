<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link id="hljs-theme" rel="stylesheet" href="vendor/hl-github.css">
<style>
  :root {
    --text: #1a1a1a;
    --bg: transparent;
    --secondary: #6b7280;
    --accent: #3a7d54;
    --code-bg: rgba(127,127,127,0.14);
    --border: rgba(127,127,127,0.22);
    --font: -apple-system, system-ui, sans-serif;
    --size: 14px;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    color: var(--text);
    font: var(--size)/1.6 var(--font);
    padding: 14px 18px 60px;
    -webkit-text-size-adjust: 100%;
    word-wrap: break-word;
  }
  #content > :first-child { margin-top: 0; }
  h1, h2, h3, h4 { line-height: 1.25; margin: 1.1em 0 0.4em; font-weight: 700; }
  h1 { font-size: 1.7em; } h2 { font-size: 1.35em; } h3 { font-size: 1.15em; }
  p { margin: 0.5em 0; }
  a { color: var(--accent); }
  ul, ol { padding-left: 1.5em; margin: 0.4em 0; }
  li { margin: 0.15em 0; }
  li.task { list-style: none; margin-left: -1.2em; }
  li.task input { margin-right: 0.5em; }
  blockquote {
    margin: 0.6em 0; padding: 0.1em 0.9em;
    border-left: 3px solid var(--accent); color: var(--secondary); font-style: italic;
  }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }
  :not(pre) > code { background: var(--code-bg); padding: 0.12em 0.35em; border-radius: 4px; }
  pre { background: var(--code-bg); padding: 0.85em 1em; border-radius: 8px; overflow-x: auto; margin: 0.7em 0; }
  pre code { background: none; padding: 0; }
  hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
  img { max-width: 100%; border-radius: 6px; }
  table { border-collapse: collapse; margin: 0.7em 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid var(--border); padding: 0.4em 0.7em; }
  th { background: var(--code-bg); }
  mark { background: rgba(255, 214, 0, 0.34); padding: 0 0.1em; border-radius: 2px; }
  .mermaid { margin: 0.9em 0; text-align: center; }
  mjx-container { overflow-x: auto; overflow-y: hidden; max-width: 100%; }
  .render-error { color: #c0392b; font-size: 0.85em; white-space: pre-wrap;
    background: rgba(192,57,43,0.08); padding: 0.5em 0.7em; border-radius: 6px; }
</style>
<script>
  // Configure MathJax BEFORE its script loads. We typeset manually (no auto
  // scan) using \( \) / \[ \] delimiters we inject after markdown render.
  window.MathJax = {
    tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
    svg: { fontCache: 'global' },
    startup: { typeset: false },
    options: { enableMenu: false },
  };
</script>
<script src="vendor/markdown-it.min.js"></script>
<script src="vendor/highlight.min.js"></script>
<script src="vendor/mermaid.min.js"></script>
<script src="vendor/tex-svg.js"></script>
</head>
<body>
<div id="content"></div>
<script>
  const md = window.markdownit({ html: false, linkify: true, breaks: true, typographer: false });
  let mermaidReady = false;
  let lastDoc = null, lastTheme = null;

  function escHTML(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Pull $$...$$ and $...$ out before markdown so it can't mangle the LaTeX,
  // then re-inject as \[..\] / \(..\) (escaped) for MathJax.
  function protectMath(src) {
    const store = [];
    let out = src.replace(/\$\$([\s\S]+?)\$\$/g, (_, t) => { store.push({ d: true, t }); return `@@MJX${store.length - 1}@@`; });
    out = out.replace(/(^|[^\\$])\$([^\$\n]+?)\$/g, (m, pre, t) => { store.push({ d: false, t }); return `${pre}@@MJX${store.length - 1}@@`; });
    return { out, store };
  }
  function restoreMath(html, store) {
    return html.replace(/@@MJX(\d+)@@/g, (_, i) => {
      const e = store[+i]; const t = escHTML(e.t);
      return e.d ? `\\[${t}\\]` : `\\(${t}\\)`;
    });
  }

  function applyTheme(theme) {
    if (!theme) return;
    const r = document.documentElement.style;
    if (theme.text) r.setProperty('--text', theme.text);
    if (theme.secondary) r.setProperty('--secondary', theme.secondary);
    if (theme.accent) r.setProperty('--accent', theme.accent);
    if (theme.codeBg) r.setProperty('--code-bg', theme.codeBg);
    if (theme.border) r.setProperty('--border', theme.border);
    if (theme.size) r.setProperty('--size', theme.size);
    document.getElementById('hljs-theme').href = theme.dark ? 'vendor/hl-github-dark.css' : 'vendor/hl-github.css';
  }

  async function renderDoc(markdown, theme) {
    lastDoc = markdown; lastTheme = theme;
    applyTheme(theme);
    const el = document.getElementById('content');
    try {
      const { out, store } = protectMath(markdown || '');
      let html = md.render(out);
      html = restoreMath(html, store);
      // GitHub-style task list checkboxes.
      html = html
        .replace(/<li>(<p>)?\[ \]\s*/g, '<li class="task">$1<input type="checkbox" disabled> ')
        .replace(/<li>(<p>)?\[[xX]\]\s*/g, '<li class="task">$1<input type="checkbox" checked disabled> ');
      el.innerHTML = html;

      // Mermaid: swap ```mermaid code blocks for <div class="mermaid"> and run.
      const mermaidNodes = el.querySelectorAll('pre code.language-mermaid');
      if (mermaidNodes.length) {
        mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: theme && theme.dark ? 'dark' : 'default' });
        mermaidNodes.forEach((code) => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code.textContent;
          code.parentElement.replaceWith(div);
        });
        try { await mermaid.run({ querySelector: '.mermaid' }); }
        catch (e) { /* mermaid annotates the node itself on parse errors */ }
      }
      // Syntax-highlight the remaining (non-mermaid) code blocks.
      el.querySelectorAll('pre code').forEach((b) => {
        if (!b.classList.contains('language-mermaid')) { try { hljs.highlightElement(b); } catch (e) {} }
      });
      // Typeset math.
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetClear && MathJax.typesetClear();
        await MathJax.typesetPromise([el]);
      }
    } catch (err) {
      el.innerHTML = '<div class="render-error">Preview error: ' + escHTML(String(err)) + '</div>';
    }
  }

  // Swift calls renderDoc(...). Expose a re-theme hook for theme switches.
  window.__renderDoc = renderDoc;
  window.__reTheme = (theme) => { if (lastDoc != null) renderDoc(lastDoc, theme); };
</script>
</body>
</html>
